<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Score — GameStreamer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #f1f5f9;
      min-height: 100vh; padding: 16px;
    }

    h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; }

    /* Status pill */
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 99px; font-size: 11px;
      font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 20px;
    }
    .status-pill.live    { background: #1c1917; color: #ef4444; border: 1px solid #ef4444; }
    .status-pill.final   { background: #1e293b; color: #64748b; border: 1px solid #334155; }
    .status-pill.scheduled { background: #1e293b; color: #64748b; border: 1px solid #334155; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

    /* Box score grid */
    .box-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 20px; }
    table {
      width: 100%; border-collapse: collapse; min-width: 480px;
      font-size: 14px;
    }
    th {
      background: #1e293b; color: #64748b; font-weight: 600;
      padding: 8px 10px; text-align: center;
      font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1px solid #334155;
    }
    th.team-col { text-align: left; min-width: 110px; }
    td {
      padding: 10px; text-align: center; border-bottom: 1px solid #1e293b;
      color: #94a3b8; font-variant-numeric: tabular-nums;
    }
    td.team-name { text-align: left; font-weight: 700; color: #e2e8f0; padding-left: 10px; }
    td.total { font-weight: 800; font-size: 16px; }
    td.total.away { color: #60a5fa; }
    td.total.home { color: #f87171; }
    td.sep { background: #1e293b; width: 4px; padding: 0; }
    td.current-inning { color: #e2e8f0; background: #1e3a5f33; }
    td.empty { color: #334155; }

    /* Totals row legend */
    .rhe-labels { display: flex; justify-content: flex-end; gap: 0; margin-bottom: 2px; }

    /* Scoreboard summary */
    .summary-card {
      background: #1e293b; border-radius: 12px; padding: 16px;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; text-align: center; margin-bottom: 20px; gap: 8px;
    }
    .s-team { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
    .s-score { font-size: 48px; font-weight: 800; line-height: 1; }
    .s-away { color: #60a5fa; }
    .s-home { color: #f87171; }
    .s-dash  { font-size: 32px; color: #334155; }
    .s-meta  { font-size: 13px; color: #64748b; margin-top: 2px; }

    /* Play log */
    .section-title {
      font-size: 11px; color: #64748b; text-transform: uppercase;
      letter-spacing: .1em; font-weight: 600; margin-bottom: 12px;
    }
    .play-card { background: #1e293b; border-radius: 12px; padding: 0 16px; margin-bottom: 20px; }
    .play-item { padding: 11px 0; border-bottom: 1px solid #0f172a; display: flex; gap: 10px; align-items: flex-start; }
    .play-item:last-child { border-bottom: none; }
    .play-badge {
      flex-shrink: 0; background: #0f172a; color: #60a5fa; border-radius: 4px;
      padding: 2px 7px; font-size: 10px; font-weight: 700; text-transform: uppercase;
      margin-top: 1px;
    }
    .play-text  { font-size: 13px; color: #cbd5e1; }
    .play-score { font-size: 11px; color: #475569; margin-top: 2px; }
    .inning-header {
      font-size: 11px; color: #3b82f6; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      padding: 10px 0 4px; border-bottom: 1px solid #1e3a5f;
    }

    .no-plays { color: #475569; text-align: center; padding: 24px 0; font-size: 14px; }
    .loading  { text-align: center; padding: 40px; color: #475569; }

    /* Nav links */
    .nav { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .nav a {
      color: #60a5fa; font-size: 13px; text-decoration: none;
      background: #1e293b; padding: 6px 12px; border-radius: 8px;
    }
    .nav a:hover { background: #334155; }
  </style>
</head>
<body>

<div id="app"><div class="loading">Loading box score…</div></div>

<script>
  const gameId = new URLSearchParams(location.search).get('game');
  let gameState = null;
  let allPlays   = [];

  async function init() {
    if (!gameId) {
      document.getElementById('app').innerHTML =
        '<div class="loading">No game ID — add <code>?game=GAMEID</code> to the URL.</div>';
      return;
    }
    await refresh();
    // Poll every 5s during live games, 30s once final
    const tick = async () => {
      await refresh();
      setTimeout(tick, gameState?.status === 'final' ? 30000 : 5000);
    };
    setTimeout(tick, 5000);
  }

  async function refresh() {
    try {
      const [stateRes, playsRes] = await Promise.all([
        fetch(`/api/game/${gameId}/state`),
        fetch(`/api/game/${gameId}/plays`),
      ]);
      if (!stateRes.ok) {
        document.getElementById('app').innerHTML =
          `<div class="loading">Game not found.</div>`;
        return;
      }
      gameState = await stateRes.json();
      allPlays  = playsRes.ok ? await playsRes.json() : (gameState.recent_plays ?? []);
      render();
    } catch (e) {
      console.error(e);
    }
  }

  function render() {
    const g = gameState;
    const maxInning = Math.max(
      g.inning,
      (g.inning_scores?.top?.length    ?? 0),
      (g.inning_scores?.bottom?.length ?? 0),
      9
    );

    const innings = Array.from({ length: maxInning }, (_, i) => i + 1);

    // Build inning cells for each team
    function cells(half) {
      return innings.map(n => {
        const idx = n - 1;
        const val = g.inning_scores?.[half]?.[idx];
        const isCurrent = n === g.inning && g.half === half && g.status === 'live';
        if (val === undefined || val === null) {
          return isCurrent
            ? `<td class="current-inning">-</td>`
            : `<td class="empty">·</td>`;
        }
        return isCurrent
          ? `<td class="current-inning">${val}</td>`
          : `<td>${val}</td>`;
      }).join('');
    }

    // Status pill
    const pill = g.status === 'live'
      ? `<div class="status-pill live"><div class="live-dot"></div>Live · ${ordinal(g.inning, g.half)}</div>`
      : g.status === 'final'
        ? `<div class="status-pill final">Final</div>`
        : `<div class="status-pill scheduled">Scheduled</div>`;

    // Play log grouped by inning/half
    const playsByHalf = {};
    const plays = [...allPlays].reverse(); // oldest first
    for (const p of plays) {
      const key = `${p.inning}-${p.half}`;
      if (!playsByHalf[key]) playsByHalf[key] = { inning: p.inning, half: p.half, plays: [] };
      playsByHalf[key].plays.push(p);
    }
    const playGroups = Object.values(playsByHalf);

    document.getElementById('app').innerHTML = `
      <div class="nav">
        <a href="/viewer.html?game=${gameId}">📺 Watch</a>
        <a href="/scorer.html">⚾ Scorer</a>
      </div>

      <h1>${esc(g.away_team)} @ ${esc(g.home_team)}</h1>
      <div class="subtitle">${g.game_date ?? ''}</div>
      ${pill}

      <!-- Scoreboard summary -->
      <div class="summary-card">
        <div>
          <div class="s-team">${esc(g.away_team)}</div>
          <div class="s-score s-away">${g.away_score}</div>
        </div>
        <div class="s-dash">–</div>
        <div>
          <div class="s-team">${esc(g.home_team)}</div>
          <div class="s-score s-home">${g.home_score}</div>
        </div>
      </div>

      <!-- Box score grid -->
      <div class="section-title">Line Score</div>
      <div class="box-wrap">
        <table>
          <thead>
            <tr>
              <th class="team-col">Team</th>
              ${innings.map(n => `<th>${n}</th>`).join('')}
              <td class="sep"></td>
              <th>R</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="team-name">${esc(g.away_team)}</td>
              ${cells('top')}
              <td class="sep"></td>
              <td class="total away">${g.away_score}</td>
            </tr>
            <tr>
              <td class="team-name">${esc(g.home_team)}</td>
              ${cells('bottom')}
              <td class="sep"></td>
              <td class="total home">${g.home_score}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Play log -->
      <div class="section-title">Play by Play</div>
      <div class="play-card">
        ${playGroups.length === 0
          ? '<div class="no-plays">No plays yet</div>'
          : playGroups.map(group => `
              <div class="inning-header">${ordinal(group.inning, group.half)}</div>
              ${group.plays.map(p => {
                const type  = p.structured_play?.play_type ?? '';
                const score = p.score_after
                  ? `${p.score_after.away ?? 0}–${p.score_after.home ?? 0}` : '';
                return `<div class="play-item">
                  <span class="play-badge">${esc(type)}</span>
                  <div>
                    <div class="play-text">${esc(p.raw_input)}</div>
                    ${score ? `<div class="play-score">${score}</div>` : ''}
                  </div>
                </div>`;
              }).join('')}
            `).join('')
        }
      </div>
    `;
  }

  function ordinal(inning, half) {
    const s = [,'st','nd','rd'][inning] ?? 'th';
    return `${half === 'top' ? '▲ Top' : '▼ Bot'} ${inning}${s}`;
  }

  function esc(s = '') {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
