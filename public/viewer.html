<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Game — GameStreamer</title>
  <!-- hls.js loaded lazily only if needed -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #f1f5f9; min-height: 100vh;
    }

    /* Video */
    .video-wrap { width: 100%; background: #000; position: relative; }
    .video-wrap iframe, .video-wrap video { width: 100%; aspect-ratio: 16/9; display: block; }
    .no-stream { aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 14px; }

    /* ── Line score ── */
    .scoreboard {
      background: #000;
      border-top: 1px solid #1e293b;
      border-bottom: 1px solid #1e293b;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .line-score {
      width: max-content;
      min-width: 100%;
      padding: 8px 12px;
    }
    .ls-row { display: flex; align-items: center; }
    .ls-row + .ls-row { margin-top: 6px; }
    .ls-team {
      width: 42px;
      margin-right: 6px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .08em;
      color: #e2e8f0;
      text-transform: uppercase;
    }
    .ls-team.muted { color: #94a3b8; }
    .ls-cell {
      width: 28px;
      height: 24px;
      margin-right: 4px;
      border: 1px solid #475569;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f1f5f9;
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .ls-head {
      border: none;
      height: auto;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .ls-empty { color: transparent; }
    .ls-current {
      background: #1e293b;
      border-color: #60a5fa;
      color: #f8fafc;
    }
    .ls-sep {
      width: 1px;
      align-self: stretch;
      background: #334155;
      margin: 0 8px;
    }
    .ls-stat {
      width: 24px;
      margin-right: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f1f5f9;
    }
    .ls-stat-head {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .ls-stat-val {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #e2e8f0;
    }

    /* ── Broadcast scorebug bar ── */
    .scorebug {
      background: #0f172a; border-top: 1px solid #1e293b;
      display: flex; align-items: center;
      padding: 8px 12px; gap: 0;
    }

    /* Inning block */
    .sb-inning {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-width: 44px; gap: 1px;
    }
    .sb-inning-arrow { font-size: 10px; color: #64748b; line-height: 1; }
    .sb-inning-arrow.active { color: #e2e8f0; }
    .sb-inning-num { font-size: 22px; font-weight: 900; color: #e2e8f0; line-height: 1; font-variant-numeric: tabular-nums; }

    .sb-divider { width: 1px; background: #1e293b; margin: 0 10px; align-self: stretch; }

    /* Diamond */
    .sb-diamond-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
    .sb-base {
      width: 14px; height: 14px; border-radius: 2px; position: absolute;
      transform: rotate(45deg); background: #1e293b; border: 1.5px solid #334155;
      transition: background .25s, border-color .25s;
    }
    .sb-base.on  { background: #f59e0b; border-color: #fbbf24; }
    .sb-base.second { top: 2px;   left: 50%; transform: translateX(-50%) rotate(45deg); }
    .sb-base.third  { top: 50%;   left: 2px; transform: translateY(-50%) rotate(45deg); }
    .sb-base.first  { top: 50%;   right: 2px; transform: translateY(-50%) rotate(45deg); }
    .sb-base.home   { bottom: 2px; left: 50%; transform: translateX(-50%) rotate(45deg); background: #0f172a; border-color: #334155; }

    /* Outs */
    .sb-outs-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-left: 6px; }
    .sb-outs-label { font-size: 9px; color: #475569; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
    .sb-outs-dots { display: flex; flex-direction: column; gap: 3px; }
    .sb-out { width: 9px; height: 9px; border-radius: 50%; background: #1e293b; border: 1.5px solid #334155; transition: background .25s; }
    .sb-out.on { background: #f59e0b; border-color: #fbbf24; }

    .sb-divider { width: 1px; background: #1e293b; margin: 0 10px; align-self: stretch; min-height: 36px; }

    /* Count */
    .sb-count-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .sb-count-label { font-size: 9px; color: #475569; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
    .sb-count-rows  { display: flex; flex-direction: column; gap: 3px; }
    .sb-count-row   { display: flex; align-items: center; gap: 4px; }
    .sb-count-letter { font-size: 9px; font-weight: 700; min-width: 8px; }
    .sb-count-letter.b { color: #4ade80; }
    .sb-count-letter.s { color: #f87171; }
    .sb-pip {
      width: 9px; height: 9px; border-radius: 50%;
      border: 1.5px solid #334155; background: #1e293b; transition: background .2s;
    }
    .sb-pip.b.on { background: #4ade80; border-color: #4ade80; }
    .sb-pip.s.on { background: #f87171; border-color: #f87171; }

    /* Spacer + live badge */
    .sb-spacer { flex: 1; }
    .sb-status { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .sb-status.live  { color: #ef4444; }
    .sb-status.other { color: #475569; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

    /* Play feed */
    .viewer-content {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      align-items: start;
    }
    .sidebar-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel-card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      overflow: hidden;
    }
    .debug-banner {
      margin: 12px 16px 0;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #7c2d12;
      background: rgba(124,45,18,0.22);
      color: #fdba74;
      font-size: 12px;
      line-height: 1.45;
    }
    .debug-banner strong {
      color: #ffedd5;
    }
    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .panel-title {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
    }
    .panel-meta {
      font-size: 11px;
      color: #64748b;
      font-variant-numeric: tabular-nums;
    }
    .mini-linescore {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .mini-linescore th,
    .mini-linescore td {
      padding: 8px 10px;
      border-bottom: 1px solid #1e293b;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }
    .mini-linescore th {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #64748b;
      background: #0f172a;
    }
    .mini-linescore td {
      font-size: 13px;
      color: #cbd5e1;
    }
    .mini-linescore td.team {
      text-align: left;
      font-weight: 700;
      color: #e2e8f0;
      width: 40%;
    }
    .lineup-card {
      padding-bottom: 6px;
    }
    .lineup-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .lineup-table th,
    .lineup-table td {
      padding: 7px 8px;
      border-bottom: 1px solid #1e293b;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }
    .lineup-table th {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #64748b;
      background: #0f172a;
    }
    .lineup-table td {
      font-size: 12px;
      color: #94a3b8;
    }
    .lineup-table td.name {
      text-align: left;
      color: #e2e8f0;
      width: 38%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lineup-table td.order {
      width: 30px;
      color: #64748b;
      font-weight: 700;
    }
    .lineup-table td.pos {
      width: 38px;
      color: #60a5fa;
      font-weight: 600;
    }
    .lineup-table tr.current-batter td {
      background: rgba(59,130,246,0.14);
      color: #f8fafc;
      font-weight: 700;
    }
    .lineup-table tr.current-batter td.name {
      color: #ffffff;
    }
    .lineup-table tr.current-batter td.order {
      color: #93c5fd;
    }
    .lineup-table tr.current-batter td.pos {
      color: #bfdbfe;
    }
    .team-band {
      padding: 9px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-top: 1px solid #1e293b;
      border-bottom: 1px solid #1e293b;
      background: #0f172a;
      color: #93c5fd;
    }
    .team-band.home {
      color: #fca5a5;
    }
    .lineup-empty {
      padding: 16px 12px;
      color: #475569;
      font-size: 13px;
      text-align: center;
    }
    .current-chip {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(59,130,246,0.18);
      color: #93c5fd;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      vertical-align: middle;
    }
    .totals-row td {
      font-weight: 700;
      color: #e2e8f0;
      background: rgba(255,255,255,0.02);
    }
    .play-feed {
      padding: 16px;
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      min-width: 0;
    }
    .feed-title { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 12px; font-weight: 600; }
    .play-item { padding: 10px 0; border-bottom: 1px solid #1e293b; display: flex; gap: 10px; }
    .play-item:last-child { border-bottom: none; }
    .play-type-badge {
      flex-shrink: 0; display: inline-block; background: #1e3a5f; color: #60a5fa;
      border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; height: fit-content; margin-top: 1px;
    }
    .play-text { font-size: 14px; color: #cbd5e1; }
    .play-score { font-size: 11px; color: #475569; margin-top: 2px; }

    .no-plays { color: #475569; font-size: 14px; padding: 20px 0; text-align: center; }
    .connecting { text-align: center; padding: 40px 16px; color: #475569; }

    @media (max-width: 920px) {
      .viewer-content {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="connecting">Connecting to game…</div>
</div>

<script>
  const gameId = new URLSearchParams(location.search).get('game');
  let gameState = null;
  let allPlays = [];
  let lineupState = { away: null, home: null };
  let lastPlayId = null;
  let hlsLoaded = false;
  let pollTimer = null;

  // ── Boot ──────────────────────────────────────────────────────────────────
  async function init() {
    if (!gameId) {
      document.getElementById('app').innerHTML =
        '<div class="connecting">No game ID in URL — add <code>?game=GAMEID</code></div>';
      return;
    }

    document.getElementById('app').innerHTML =
      '<div class="connecting">Loading game…</div>';

    const ok = await fetchData();
    if (!ok) return; // error already displayed

    renderAll();
    startPolling();
  }

  // ── Fetch /api/game/:id/state ─────────────────────────────────────────────
  async function fetchData() {
    try {
      const [stateRes, playsRes, lineupRes] = await Promise.all([
        fetch(`/api/game/${gameId}/state`),
        fetch(`/api/game/${gameId}/plays`),
        fetch(`/api/game/${gameId}/lineup`),
      ]);

      if (stateRes.status === 404) {
        document.getElementById('app').innerHTML =
          `<div class="connecting">Game <strong>${esc(gameId)}</strong> not found.</div>`;
        return false;
      }
      if (!stateRes.ok) {
        let message = `Unable to load game (HTTP ${stateRes.status})`;
        try {
          const body = await stateRes.json();
          if (body?.error) message = body.error;
        } catch {}
        if (!gameState) {
          document.getElementById('app').innerHTML =
            `<div class="connecting">${esc(message)}</div>`;
        }
        return false;
      }
      const data = await stateRes.json();

      const isFirstLoad = !gameState;
      const plays = playsRes.ok ? await playsRes.json() : (data.recent_plays ?? []);
      const lineup = lineupRes.ok ? await lineupRes.json() : { away: null, home: null };
      const latestPlayId = plays?.[0]?.id ?? data.recent_plays?.[0]?.id ?? null;
      const hasNewPlay = latestPlayId !== lastPlayId;

      gameState = data;
      allPlays = Array.isArray(plays) ? plays : [];
      lineupState = lineup ?? { away: null, home: null };
      lastPlayId = latestPlayId;

      console.log('[viewer] Lineup fetched:', {
        away: lineupState.away?.current_batter?.name,
        home: lineupState.home?.current_batter?.name,
        isFirstLoad,
        hasNewPlay
      });

      if (!isFirstLoad) {
        renderScoreboard();
        renderScorebug(); // always sync count (balls/strikes) from server state
        renderBoxScoreSidebar();
        if (hasNewPlay) renderPlayLog();
      }
      return true;
    } catch (err) {
      console.error('Poll error:', err);
      if (!gameState) {
        document.getElementById('app').innerHTML =
          '<div class="connecting">Could not reach the local server. Check that it is still running.</div>';
      }
      return gameState != null; // keep showing stale data if we had any
    }
  }

  function startPolling() {
    // Poll every 3 seconds while game is live, every 10 when final
    const interval = () => (gameState?.status === 'final' ? 10000 : 3000);
    const tick = async () => {
      await fetchData();
      pollTimer = setTimeout(tick, interval());
    };
    pollTimer = setTimeout(tick, interval());
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderAll() {
    document.getElementById('app').innerHTML = `
      <div class="video-wrap" id="video-wrap"></div>
      <div class="scoreboard" id="scoreboard"></div>
      <div class="scorebug" id="scorebug"></div>
      <div id="debug-banner"></div>
      <div class="viewer-content">
        <div class="sidebar-stack" id="boxscore-sidebar"></div>
        <div class="play-feed">
          <div class="feed-title">Play by Play</div>
          <div id="play-log"></div>
        </div>
      </div>
    `;
    renderVideo();
    renderScoreboard();
    renderScorebug();
    renderBoxScoreSidebar();
    renderPlayLog();
  }

  function renderVideo() {
    const wrap = document.getElementById('video-wrap');
    const url = gameState.stream_url;
    if (!url) {
      wrap.innerHTML = '<div class="no-stream">📺 Stream not yet started</div>';
      return;
    }

    // YouTube
    const yt = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/))([a-zA-Z0-9_-]{11})/);
    if (yt) {
      wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${yt[1]}?autoplay=1&mute=1"
        allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      return;
    }

    // Twitch — twitch.tv/username
    const tw = url.match(/twitch\.tv\/([a-zA-Z0-9_]+)/);
    if (tw) {
      const parent = location.hostname || 'localhost';
      wrap.innerHTML = `<iframe src="https://player.twitch.tv/?channel=${tw[1]}&parent=${parent}&autoplay=true&muted=true"
        allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      return;
    }

    // HLS — load hls.js lazily then attach
    if (url.includes('.m3u8')) {
      wrap.innerHTML = '<video id="hls-video" controls autoplay muted playsinline></video>';
      const video = document.getElementById('hls-video');
      loadHls().then(() => {
        if (window.Hls?.isSupported()) {
          const hls = new window.Hls();
          hls.loadSource(url);
          hls.attachMedia(video);
        } else {
          video.src = url; // Safari native HLS
        }
      });
      return;
    }

    wrap.innerHTML = `<iframe src="${esc(url)}" allowfullscreen></iframe>`;
  }

  function loadHls() {
    if (hlsLoaded) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
      s.onload = () => { hlsLoaded = true; resolve(); };
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  function renderScoreboard() {
    const g = gameState;
    const maxInning = Math.max(
      g.inning ?? 1,
      g.inning_scores?.top?.length ?? 0,
      g.inning_scores?.bottom?.length ?? 0,
      9
    );
    const innings = Array.from({ length: maxInning }, (_, i) => i + 1);

    function teamAbbr(name) {
      const words = String(name ?? '').trim().split(/\s+/).filter(Boolean);
      if (words.length === 0) return 'TBD';
      if (words.length === 1) return words[0].slice(0, 3).toUpperCase();
      return words.slice(0, 2).map(word => word[0]).join('').toUpperCase();
    }

    function inningCell(half, inning) {
      const val = g.inning_scores?.[half]?.[inning - 1];
      const isCurrent = g.status === 'live' && g.half === half && g.inning === inning;
      return `<div class="ls-cell${isCurrent ? ' ls-current' : ''}${val == null ? ' ls-empty' : ''}">${val == null ? '' : esc(String(val))}</div>`;
    }

    function statValue(value) {
      return `<div class="ls-stat"><div class="ls-stat-val">${value}</div></div>`;
    }

    document.getElementById('scoreboard').innerHTML = `
      <div class="line-score">
        <div class="ls-row">
          <div class="ls-team"></div>
          ${innings.map(inning => `<div class="ls-cell ls-head">${inning}</div>`).join('')}
          <div class="ls-sep"></div>
          ${['R', 'H', 'E'].map(label => `<div class="ls-stat"><div class="ls-stat-head">${label}</div></div>`).join('')}
        </div>
        <div class="ls-row">
          <div class="ls-team">${esc(teamAbbr(g.away_team))}</div>
          ${innings.map(inning => inningCell('top', inning)).join('')}
          <div class="ls-sep"></div>
          ${statValue(g.away_score ?? 0)}
          ${statValue(g.away_hits ?? 0)}
          ${statValue(g.away_errors ?? 0)}
        </div>
        <div class="ls-row">
          <div class="ls-team muted">${esc(teamAbbr(g.home_team))}</div>
          ${innings.map(inning => inningCell('bottom', inning)).join('')}
          <div class="ls-sep"></div>
          ${statValue(g.home_score ?? 0)}
          ${statValue(g.home_hits ?? 0)}
          ${statValue(g.home_errors ?? 0)}
        </div>
      </div>
    `;
  }

  function renderScorebug() {
    const g  = gameState;
    const r  = g.runners ?? {};
    const balls   = g.balls   ?? 0;
    const strikes = g.strikes ?? 0;
    const outs    = g.outs    ?? 0;
    const isLive  = g.status === 'live';

    // Inning half arrows
    const upArrow   = `<div class="sb-inning-arrow${g.half === 'top'    ? ' active' : ''}">▲</div>`;
    const downArrow = `<div class="sb-inning-arrow${g.half === 'bottom' ? ' active' : ''}">▼</div>`;

    // Base pips (4 balls, 3 strikes, 2 outs shown as rows of dots)
    const ballPips   = [0,1,2,3].map(i =>
      `<div class="sb-pip b${i < balls   ? ' on' : ''}"></div>`).join('');
    const strikePips = [0,1,2].map(i =>
      `<div class="sb-pip s${i < strikes ? ' on' : ''}"></div>`).join('');
    const outPips    = [0,1,2].map(i =>
      `<div class="sb-out${i < outs ? ' on' : ''}"></div>`).join('');

    const statusHtml = isLive
      ? `<div class="sb-status live"><div class="live-dot"></div>Live</div>`
      : `<div class="sb-status other">${g.status === 'final' ? 'Final' : 'Pre-game'}</div>`;

    document.getElementById('scorebug').innerHTML = `
      <!-- Inning -->
      <div class="sb-inning">
        ${upArrow}
        <div class="sb-inning-num">${g.inning ?? 1}</div>
        ${downArrow}
      </div>

      <div class="sb-divider"></div>

      <!-- Diamond + outs -->
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="sb-diamond-wrap">
          <div class="sb-base second${r.second ? ' on' : ''}"></div>
          <div class="sb-base third${r.third   ? ' on' : ''}"></div>
          <div class="sb-base first${r.first   ? ' on' : ''}"></div>
          <div class="sb-base home"></div>
        </div>
        <div class="sb-outs-wrap">
          <div class="sb-outs-label">Out</div>
          <div class="sb-outs-dots">${outPips}</div>
        </div>
      </div>

      <div class="sb-divider"></div>

      <!-- Count -->
      <div class="sb-count-wrap">
        <div class="sb-count-label">Count</div>
        <div class="sb-count-rows">
          <div class="sb-count-row">
            <span class="sb-count-letter b">B</span>${ballPips}
          </div>
          <div class="sb-count-row">
            <span class="sb-count-letter s">S</span>${strikePips}
          </div>
        </div>
      </div>

      <div class="sb-spacer"></div>
      ${statusHtml}
    `;
  }

  function computeHE(plays) {
    let awayH = 0, awayE = 0, homeH = 0, homeE = 0, awayK = 0, homeK = 0, awayBB = 0, homeBB = 0;
    for (const p of plays) {
      const sp = p?.structured_play;
      if (!sp) continue;
      const isHit = sp.hit === true || ['single', 'double', 'triple', 'home_run'].includes(sp.play_type);
      const isError = sp.error === true || sp.play_type === 'error';
      const isStrikeout = sp.play_type === 'strikeout';
      const isWalk = sp.play_type === 'walk' || sp.play_type === 'hit_by_pitch';
      const awayBatting = p.half === 'top';
      if (isHit) {
        if (awayBatting) awayH++; else homeH++;
      }
      if (isError) {
        if (awayBatting) homeE++; else awayE++;
      }
      if (isStrikeout) {
        if (awayBatting) awayK++; else homeK++;
      }
      if (isWalk) {
        if (awayBatting) awayBB++; else homeBB++;
      }
    }
    return { awayH, awayE, homeH, homeE, awayK, homeK, awayBB, homeBB };
  }

  function computeBatting(plays) {
    const stats = new Map();

    function get(name) {
      const key = name || 'Unknown';
      if (!stats.has(key)) {
        stats.set(key, { ab: 0, r: 0, h: 0, rbi: 0, bb: 0, so: 0 });
      }
      return stats.get(key);
    }

    for (const p of plays) {
      const sp = p?.structured_play;
      if (!sp) continue;
      const batter = sp.batter;
      if (batter) {
        const s = get(batter);
        if (['single', 'double', 'triple', 'home_run', 'strikeout', 'groundout', 'flyout', 'fielders_choice', 'error', 'bunt', 'other'].includes(sp.play_type)) s.ab++;
        if (sp.play_type === 'walk' || sp.play_type === 'hit_by_pitch') s.bb++;
        if (sp.play_type === 'strikeout') s.so++;
        if (sp.hit === true || ['single', 'double', 'triple', 'home_run'].includes(sp.play_type)) s.h++;
        if (sp.runs_scored) s.rbi += sp.runs_scored;
      }

      for (const runner of (sp.runners ?? [])) {
        if (runner.to === 'H' && runner.name) get(runner.name).r++;
      }
    }

    return stats;
  }

  function formatAVG(h, ab) {
    if (!ab) return '.---';
    return '.' + String(Math.round((h / ab) * 1000)).padStart(3, '0');
  }

  function lineupRows(side) {
    const lineup = lineupState?.[side];
    const plays = [...allPlays].reverse().filter((p) => p.half === (side === 'away' ? 'top' : 'bottom'));
    const stats = computeBatting(plays);
    const players = Array.isArray(lineup?.effective_players) && lineup.effective_players.length
      ? lineup.effective_players
      : [...stats.keys()].map((name, index) => ({ batting_order: index + 1, name, position: '' }));

    if (!players.length) {
      return `<div class="lineup-empty">No lineup or batting data yet</div>`;
    }

    let totals = { ab: 0, r: 0, h: 0, rbi: 0, bb: 0, so: 0 };
    const currentName = lineup?.current_batter?.name ?? null;
    console.log(`[lineupRows] ${side}: currentName="${currentName}", currentIndex=${lineup?.current_batter_index}, batter="${lineup?.current_batter?.name}"`);
    const body = players.map((player, index) => {
      const s = stats.get(player.name) ?? { ab: 0, r: 0, h: 0, rbi: 0, bb: 0, so: 0 };
      totals.ab += s.ab; totals.r += s.r; totals.h += s.h; totals.rbi += s.rbi; totals.bb += s.bb; totals.so += s.so;
      const isCurrent = gameState?.status === 'live' && currentName && player.name === currentName;
      return `<tr${isCurrent ? ' class="current-batter"' : ''}>
        <td class="order">${esc(player.batting_order ?? index + 1)}</td>
        <td class="name">${esc(player.name ?? 'Unknown')}${isCurrent ? '<span class="current-chip">At Bat</span>' : ''}</td>
        <td class="pos">${esc(player.position ?? '')}</td>
        <td>${s.ab}</td>
        <td>${s.r}</td>
        <td>${s.h}</td>
        <td>${s.rbi}</td>
        <td>${s.bb}</td>
        <td>${s.so}</td>
        <td>${formatAVG(s.h, s.ab)}</td>
      </tr>`;
    }).join('');

    return `<table class="lineup-table">
      <thead>
        <tr>
          <th>#</th><th style="text-align:left">Batter</th><th>Pos</th>
          <th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>SO</th><th>AVG</th>
        </tr>
      </thead>
      <tbody>
        ${body}
        <tr class="totals-row">
          <td></td><td class="name">Totals</td><td class="pos"></td>
          <td>${totals.ab}</td><td>${totals.r}</td><td>${totals.h}</td><td>${totals.rbi}</td><td>${totals.bb}</td><td>${totals.so}</td><td></td>
        </tr>
      </tbody>
    </table>`;
  }

  function renderBoxScoreSidebar() {
    if (!gameState) return;
    const { awayH, awayE, homeH, homeE, awayK, homeK, awayBB, homeBB } = computeHE(allPlays);
    const sidebar = document.getElementById('boxscore-sidebar');
    const debugBanner = document.getElementById('debug-banner');
    const missingAway = !lineupState?.away?.effective_players?.length;
    const missingHome = !lineupState?.home?.effective_players?.length;

    if (missingAway || missingHome) {
      const missingSides = [
        missingAway ? `away (${esc(gameState.away_team)})` : null,
        missingHome ? `home (${esc(gameState.home_team)})` : null,
      ].filter(Boolean).join(', ');
      debugBanner.innerHTML = `<div class="debug-banner"><strong>Lineup debug:</strong> No lineup/team roster is attached for ${missingSides}. The box score is falling back to batters found in play data only.</div>`;
    } else {
      debugBanner.innerHTML = '';
    }

    sidebar.innerHTML = `
      <div class="panel-card">
        <div class="panel-head">
          <div class="panel-title">Game Stats</div>
          <div class="panel-meta">${gameState.status === 'live' ? `${gameState.half === 'top' ? 'Top' : 'Bot'} ${gameState.inning}` : esc(gameState.status)}</div>
        </div>
        <table class="mini-linescore">
          <thead>
            <tr><th style="text-align:left">Team</th><th>R</th><th>H</th><th>K</th><th>BB</th><th>E</th></tr>
          </thead>
          <tbody>
            <tr>
              <td class="team">${esc(gameState.away_team)}</td>
              <td>${gameState.away_score ?? 0}</td>
              <td>${awayH}</td>
              <td>${awayK}</td>
              <td>${awayBB}</td>
              <td>${awayE}</td>
            </tr>
            <tr>
              <td class="team">${esc(gameState.home_team)}</td>
              <td>${gameState.home_score ?? 0}</td>
              <td>${homeH}</td>
              <td>${homeK}</td>
              <td>${homeBB}</td>
              <td>${homeE}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="panel-card lineup-card">
        <div class="panel-head">
          <div class="panel-title">Box Score</div>
          <div class="panel-meta">Lineup + Batting</div>
        </div>
        <div class="team-band">${esc(gameState.away_team)}</div>
        ${lineupRows('away')}
        <div class="team-band home">${esc(gameState.home_team)}</div>
        ${lineupRows('home')}
      </div>
    `;
  }

  function renderPlayLog() {
    const plays = gameState.recent_plays ?? [];
    document.getElementById('play-log').innerHTML = plays.length
      ? plays.map(playHtml).join('')
      : '<div class="no-plays">Waiting for first play…</div>';
  }

  function playHtml(p) {
    const type = p.structured_play?.play_type ?? '';
    const count = p.structured_play?.count_after;
    const summary = p.structured_play?.summary;
    const score = p.score_after
      ? `${p.score_after.away ?? 0}–${p.score_after.home ?? 0}` : '';
    const meta = [];
    if (count && Number.isFinite(count.balls) && Number.isFinite(count.strikes)) {
      meta.push(`Count ${count.balls}-${count.strikes}`);
    }
    if (score) meta.push(`Score ${score}`);
    return `<div class="play-item">
      <span class="play-type-badge">${esc(type)}</span>
      <div>
        <div class="play-text">${esc(p.raw_input)}</div>
        ${summary ? `<div class="play-score">${esc(summary)}</div>` : ''}
        ${meta.length ? `<div class="play-score">${esc(meta.join(' • '))}</div>` : ''}
      </div>
    </div>`;
  }

  function ordinal(inning, half) {
    const s = [,'st','nd','rd'][inning] ?? 'th';
    return `${half === 'top' ? '▲' : '▼'} ${inning}${s}`;
  }

  function esc(s = '') {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
